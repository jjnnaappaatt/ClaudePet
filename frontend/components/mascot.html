*{box-sizing:border-box}
body{margin:0;background:#101216;font-family:var(--font);color:var(--text-primary);

.sub{font-size:11px;color:var(--text-secondary);margin:0 0 18px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.tile{margin:0;background:linear-gradient(var(--card-top),var(--card-bottom));
